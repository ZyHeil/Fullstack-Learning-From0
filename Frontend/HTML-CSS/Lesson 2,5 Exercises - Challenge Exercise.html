<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Prac2</title>
    <style>
      .h1 {
        font-family: "Times New Roman", Times, serif;
      }

      .price {
        color: yellowgreen;
        font-family: "Times New Roman", Times, serif;
        font-weight: bold;
      }

      /* Add to Cart button */
      .Cart {
        height: 28px;
        width: 110px;
        border-radius: 14px;
        background-color: yellow;
        border: none;
        margin-right: 8px;
        cursor: pointer;
        transition: background-color 0.15s;
      }
      
      /* Buy now Button */
      .Buy {
        height: 28px;
        width: 110px;
        border-radius: 14px;
        background-color: rgb(0, 173, 0);
        border: none;
        cursor: pointer;
      }


    </style>
  </head>
  <body>
    <h1>Recreating some amazon stuff</h1>
    <p>Prac2</p>
    <br />
    <a href="https://www.amazon.com/"> Back to Amazon </a>

    <br />

    <h2 class="h1">Nike Black Running Shoes</h2>

    <p class="price">$67 - in stock.</p>
    <p>Free delivery tomorrow.</p>

    <button class="Cart">Add to Cart</button>

    <button class="Buy">Buy now</button>
  </body>
</html>
